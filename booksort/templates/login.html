<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BookSort</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
    <style>
        body {
            min-height: 100dvh;
            background-color: #121212;
            color: #e0e0e0;
            display: grid;
            place-items: center;
            padding: 1rem;
        }
        .login-panel {
            width: min(100%, 26rem);
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 0.5rem;
            padding: 1.25rem;
        }
        .form-control {
            background-color: #2d2d2d;
            border-color: #444;
            color: #e0e0e0;
        }
        .form-control:focus {
            background-color: #2d2d2d;
            border-color: #8ab4ff;
            color: #fff;
            box-shadow: 0 0 0 0.2rem rgba(138,180,255,0.2);
        }
        .text-muted {
            color: #999 !important;
        }
    </style>
</head>
<body>
    <main class="login-panel">
        <h1 class="h3 mb-1">BookSort</h1>
        <p class="text-muted mb-4">Enter your password to continue.</p>

        {% if error %}
            <div class="alert alert-danger" role="alert">{{ error }}</div>
        {% endif %}

        <form method="post" action="{{ url_for('main.login') }}">
            <input type="hidden" name="next" value="{{ next_url }}">
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input class="form-control" type="password" id="password" name="password" autocomplete="current-password" autofocus required>
            </div>
            <button class="btn btn-primary w-100" type="submit">
                <i class="bi bi-unlock"></i> Unlock
            </button>
        </form>
    </main>
</body>
</html>
