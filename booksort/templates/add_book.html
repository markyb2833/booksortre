<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Book - BookSort</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            overflow-x: hidden;
        }
        .navbar {
            background-color: #1e1e1e !important;
            border-bottom: 1px solid #333;
        }
        .form-control {
            background-color: #1e1e1e;
            border-color: #333;
            color: #e0e0e0;
        }
        .form-control:focus {
            background-color: #2d2d2d;
            border-color: #444;
            color: #e0e0e0;
            box-shadow: 0 0 0 0.25rem rgba(66, 70, 73, 0.5);
        }
        .form-label {
            color: #e0e0e0;
        }
        .search-results {
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 4px;
            margin-top: 10px;
            padding: 10px;
        }
        .book-result {
            padding: 10px;
            border-bottom: 1px solid #333;
            cursor: pointer;
        }
        .book-result:last-child {
            border-bottom: none;
        }
        .book-result:hover {
            background-color: #2d2d2d;
        }
        .book-cover {
            max-width: 100px;
            height: auto;
            margin-right: 15px;
        }
        .cover-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(84px, 1fr));
            gap: 0.75rem;
        }
        .cover-choice {
            background: #252525;
            border: 1px solid #444;
            border-radius: 0.375rem;
            padding: 0.5rem;
            cursor: pointer;
        }
        .cover-choice:hover {
            border-color: #8ab4ff;
        }
        .cover-choice img {
            width: 100%;
            height: 120px;
            object-fit: contain;
            display: block;
            margin-bottom: 0.4rem;
        }
        .navbar .container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }
        .navbar-nav form {
            margin: 0;
        }
        .navbar-nav .btn {
            padding: 0.35rem 0.5rem;
        }
        @media (max-width: 768px) {
            .navbar .container {
                align-items: stretch;
            }
            .navbar-brand {
                width: 100%;
                margin-right: 0;
            }
            .navbar-nav {
                width: 100%;
                flex-direction: row;
                flex-wrap: wrap;
                gap: 0.5rem;
            }
            .navbar-nav .nav-link {
                padding: 0.35rem 0.5rem;
            }
            .container {
                padding-left: 0.75rem;
                padding-right: 0.75rem;
            }
            .input-group {
                flex-direction: column;
                gap: 0.5rem;
            }
            .input-group > * {
                width: 100% !important;
                border-radius: 0.375rem !important;
            }
            .book-result {
                gap: 0.75rem;
            }
            .book-cover {
                width: 64px;
                min-width: 64px;
                margin-right: 0;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('main.index') }}">BookSort</a>
            <div class="navbar-nav">
                <a class="nav-link" href="{{ url_for('main.add_book') }}">Add Book</a>
                <a class="nav-link" href="{{ url_for('main.settings') }}">Settings</a>
                <form method="post" action="{{ url_for('main.logout') }}">
                    <button class="btn btn-link nav-link" type="submit">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-8 offset-md-2">
                <h1>Add New Book</h1>
                
                <!-- Search Section -->
                <div class="mb-4">
                    <div class="input-group">
                        <input type="text" class="form-control" id="searchInput" placeholder="Search for a book...">
                        <button class="btn btn-primary" type="button" id="searchButton">Search</button>
                    </div>
                    <div id="searchResults" class="search-results" style="display: none;"></div>
                </div>

                <form method="POST">
                    <div class="mb-3">
                        <label for="title" class="form-label">Title</label>
                        <input type="text" class="form-control" id="title" name="title" required>
                    </div>
                    <div class="mb-3">
                        <label for="author" class="form-label">Author</label>
                        <input type="text" class="form-control" id="author" name="author" required>
                    </div>
                    <div class="mb-3">
                        <label for="isbn" class="form-label">ISBN</label>
                        <input type="text" class="form-control" id="isbn" name="isbn">
                    </div>
                    <div class="mb-3">
                        <label for="publication_year" class="form-label">Publication Year</label>
                        <input type="number" class="form-control" id="publication_year" name="publication_year">
                    </div>
                    <div class="mb-3">
                        <label for="genre" class="form-label">Genre</label>
                        <input type="text" class="form-control" id="genre" name="genre">
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description" rows="3"></textarea>
                    </div>
                    <input type="hidden" id="cover_url" name="cover_url">
                    <div class="mb-3">
                        <label for="addCoverUrl" class="form-label">Cover URL</label>
                        <div class="input-group">
                            <input type="url" class="form-control" id="addCoverUrl" placeholder="https://...">
                            <button class="btn btn-outline-secondary" type="button" id="searchCoverButton">Search Covers</button>
                            <button class="btn btn-outline-secondary" type="button" id="clearCoverButton">Clear</button>
                        </div>
                        <div class="mt-2">
                            <img id="addCoverPreview" src="" alt="Cover preview" style="max-width: 100px; max-height: 150px; display: none;" class="border" loading="lazy" decoding="async">
                        </div>
                        <div class="cover-gallery mt-3" id="addCoverGallery"></div>
                    </div>
                    <input type="hidden" id="rating" name="rating">
                    <button type="submit" class="btn btn-primary">Add Book</button>
                    <a href="{{ url_for('main.index') }}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('searchButton').addEventListener('click', searchBooks);
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchBooks();
            }
        });

        function searchBooks() {
            const query = document.getElementById('searchInput').value;
            if (!query) return;

            fetch(`/search_book?q=${encodeURIComponent(query)}`)
                .then(async response => {
                    const data = await response.json();
                    if (!response.ok) {
                        throw new Error(data.error || 'Error searching for books');
                    }
                    return data;
                })
                .then(data => {
                    const resultsDiv = document.getElementById('searchResults');
                    resultsDiv.innerHTML = '';
                    resultsDiv.style.display = 'block';

                    if (data.length) {
                        data.slice(0, 5).forEach(book => {
                            const resultDiv = document.createElement('div');
                            resultDiv.className = 'book-result d-flex align-items-start';
                            resultDiv.innerHTML = `
                                ${book.cover_url ? `<img src="${book.cover_url}" class="book-cover" alt="Book cover" loading="lazy" decoding="async">` : ''}
                                <div>
                                    <h5 class="mb-1">${book.title || 'Untitled'}</h5>
                                    <p class="mb-1">${book.author || 'Unknown author'}</p>
                                    <small class="text-muted">${book.publication_year || ''}</small>
                                </div>
                            `;

                            resultDiv.addEventListener('click', () => {
                                fillBookForm(book);
                                renderCoverGallery(data.filter(candidate => candidate.cover_url).slice(0, 5));
                                resultsDiv.style.display = 'none';
                            });

                            resultsDiv.appendChild(resultDiv);
                        });
                    } else {
                        resultsDiv.innerHTML = '<p class="p-3">No results found</p>';
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    const resultsDiv = document.getElementById('searchResults');
                    resultsDiv.innerHTML = `<p class="p-3">Error searching for books: ${error.message}</p>`;
                    resultsDiv.style.display = 'block';
                });
        }

        function fillBookForm(book) {
            document.getElementById('title').value = book.title || '';
            document.getElementById('author').value = book.author || '';
            document.getElementById('isbn').value = book.isbn || '';
            document.getElementById('publication_year').value = book.publication_year || '';
            document.getElementById('description').value = book.description || '';
            document.getElementById('rating').value = book.rating || '';
            document.getElementById('genre').value = book.genre || '';
            setAddCover(book.cover_url || '');
        }

        function setAddCover(url) {
            const hiddenInput = document.getElementById('cover_url');
            const visibleInput = document.getElementById('addCoverUrl');
            const preview = document.getElementById('addCoverPreview');
            hiddenInput.value = url || '';
            visibleInput.value = url || '';
            if (url) {
                preview.src = url;
                preview.style.display = 'block';
            } else {
                preview.removeAttribute('src');
                preview.style.display = 'none';
            }
        }

        function clearCover() {
            setAddCover('');
            document.getElementById('addCoverGallery').innerHTML = '';
        }

        function renderCoverGallery(books) {
            const gallery = document.getElementById('addCoverGallery');
            gallery.innerHTML = '';

            books.forEach(book => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'cover-choice';
                button.innerHTML = `
                    <img src="${book.cover_url}" alt="Cover option" loading="lazy" decoding="async">
                    <small>${book.title || 'Cover option'}</small>
                `;
                button.addEventListener('click', () => {
                    setAddCover(book.cover_url);
                });
                gallery.appendChild(button);
            });
        }

        function searchCovers() {
            const title = document.getElementById('title').value;
            const author = document.getElementById('author').value;
            const query = `${title} ${author}`.trim() || document.getElementById('searchInput').value.trim();
            if (!query) {
                alert('Please enter a title and/or author first');
                return;
            }

            fetch(`/search_book?q=${encodeURIComponent(query)}`)
                .then(async response => {
                    const data = await response.json();
                    if (!response.ok) {
                        throw new Error(data.error || 'Error searching for cover image');
                    }
                    return data;
                })
                .then(data => {
                    const coverChoices = data.filter(book => book.cover_url).slice(0, 5);
                    renderCoverGallery(coverChoices);
                    if (coverChoices.length && !document.getElementById('cover_url').value) {
                        setAddCover(coverChoices[0].cover_url);
                    }
                    if (!coverChoices.length) {
                        alert('No cover image found for this book');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Error searching for cover image: ' + error.message);
                });
        }

        document.getElementById('addCoverUrl').addEventListener('input', function() {
            setAddCover(this.value);
        });
        document.getElementById('searchCoverButton').addEventListener('click', searchCovers);
        document.getElementById('clearCoverButton').addEventListener('click', clearCover);
    </script>
</body>
</html>
